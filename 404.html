<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Max Haditsch</title>
  <meta name="robots" content="noindex" />

  <link rel="stylesheet" href="https://use.typekit.net/xdm2jjs.css" />
  <style>
    :root {
      --bg:     #FFFFFF;
      --text:   #0C0C0A;
      --muted:  #888880;
      --border: #D4D1CA;
      --font:   'area-inktrap', sans-serif;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1.75rem 2.5rem;
    }

    a { color: inherit; text-decoration: none; }
    * { cursor: none !important; }

    /* ── CURSOR ── */
    #cursor {
      position: fixed;
      top: 0; left: 0;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.25s var(--ease-out), height 0.25s var(--ease-out),
                  background 0.2s ease, border-radius 0.25s var(--ease-out);
      will-change: transform;
    }
    #cursor.hover {
      width: 48px; height: 48px;
      background: transparent;
      border: 1px solid var(--text);
    }
    @media (pointer: coarse) { #cursor { display: none !important; } * { cursor: auto !important; } }

    /* ── NAV ── */
    #nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #nav-logo {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #nav-back {
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s ease;
    }
    #nav-back:hover { color: var(--text); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .error-num {
      font-size: clamp(7rem, 20vw, 18rem);
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 0.9;
      color: var(--muted);
      user-select: none;
    }

    .error-msg {
      margin-top: 2rem;
      font-size: clamp(1rem, 2vw, 1.375rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      max-width: 28ch;
    }

    .error-sub {
      margin-top: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--muted);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2.5rem;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.2em;
      transition: border-color 0.2s ease, color 0.2s ease;
    }
    .back-link:hover { border-color: var(--text); }

    /* ── FOOTER ── */
    footer {
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    @media (max-width: 768px) {
      body { padding: 1.25rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div id="cursor"></div>

  <nav id="nav">
    <a id="nav-logo" href="index.html">&#169; MH</a>
    <a id="nav-back" href="index.html">Home</a>
  </nav>

  <main>
    <div class="error-num">404</div>
    <p class="error-msg">This page doesn't exist.</p>
    <p class="error-sub">It may have moved or never existed.</p>
    <a class="back-link" href="index.html">← Back to home</a>
  </main>

  <footer>Max Haditsch — Brand Designer &amp; Strategist</footer>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
    });
    document.querySelectorAll('a').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });
  </script>

</body>
</html>
